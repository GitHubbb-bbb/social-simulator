<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社交预演系统</title>
<style>
  :root {
    --bg: #FAF9F6;
    --bg2: #F3F1EC;
    --bg3: #ECEAE3;
    --card: #FFFFFF;
    --border: #E0DDD5;
    --border2: #CCC9BF;
    --text: #2A2825;
    --text2: #6B6860;
    --text3: #9B9890;
    --accent: #5B7FA6;
    --accent-bg: #EBF1F8;
    --teal: #1D9E75;
    --teal-bg: #E1F5EE;
    --amber: #BA7517;
    --amber-bg: #FAEEDA;
    --coral: #C4503A;
    --coral-bg: #FAECE7;
    --purple: #6B5DC4;
    --purple-bg: #EEEDFE;
    --gray-node: #F3F1EC;
    --gray-node-border: #CCC9BF;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --font: 'Georgia', 'Noto Serif SC', serif;
    --font-ui: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 0;
    height: 52px;
  }
  .nav-brand {
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    margin-right: 32px;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .nav-brand span { color: var(--text3); font-size: 12px; margin-left: 6px; }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab {
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    border: none; background: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .nav-tab:hover { background: var(--bg2); color: var(--text); }
  .nav-tab.active { background: var(--bg2); color: var(--text); font-weight: 500; }

  /* ── LAYOUT ── */
  .page { display: none; padding: 24px; max-width: 1300px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── SCENE LIBRARY ── */
  .library-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }

  .filter-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    height: fit-content;
    position: sticky; top: 72px;
  }
  .filter-section { margin-bottom: 20px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
    color: var(--text3); text-transform: uppercase;
    margin-bottom: 8px; display: block;
  }
  .filter-btn {
    display: block; width: 100%;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    border: none; background: none;
    text-align: left; cursor: pointer;
    font-size: 13px; color: var(--text2);
    transition: all 0.12s;
    margin-bottom: 2px;
  }
  .filter-btn:hover { background: var(--bg2); color: var(--text); }
  .filter-btn.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
  .filter-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 12px; color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
    margin: 2px;
  }
  .filter-tag:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tag.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  .scene-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    align-content: start;
  }
  .scene-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .scene-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .scene-card.axis-0::before { background: var(--teal); }
  .scene-card.axis-1::before { background: var(--purple); }
  .scene-card.axis-2::before { background: var(--accent); }
  .scene-card.axis-3::before { background: var(--coral); }
  .scene-card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .scene-card-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .scene-card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 10px; }
  .scene-card-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px; font-weight: 500;
  }
  .tag-axis { background: var(--bg2); color: var(--text2); }
  .tag-purpose-0 { background: var(--teal-bg); color: var(--teal); }
  .tag-purpose-1 { background: var(--accent-bg); color: var(--accent); }
  .tag-purpose-2 { background: var(--amber-bg); color: var(--amber); }
  .tag-purpose-3 { background: var(--purple-bg); color: var(--purple); }
  .tag-energy-low  { background: var(--teal-bg); color: var(--teal); }
  .tag-energy-mid  { background: var(--amber-bg); color: var(--amber); }
  .tag-energy-high { background: var(--coral-bg); color: var(--coral); }

  /* ── SIMULATOR PAGE ── */
  .sim-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .back-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card); cursor: pointer;
    font-size: 13px; color: var(--text2);
    transition: all 0.12s;
    display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { background: var(--bg2); }
  .sim-title { font-size: 18px; font-weight: 500; color: var(--text); }
  .sim-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }

  .energy-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .energy-bar-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .energy-btns { display: flex; gap: 6px; }
  .energy-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none; cursor: pointer;
    font-size: 12px; color: var(--text2);
    transition: all 0.12s;
  }
  .energy-btn:hover { border-color: var(--border2); }
  .energy-btn.e-high.active  { background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }
  .energy-btn.e-mid.active   { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
  .energy-btn.e-low.active   { background: var(--coral-bg); border-color: var(--coral); color: var(--coral); }
  .energy-hint { font-size: 12px; color: var(--text3); margin-left: auto; }

  /* ── TREE ── */
  .tree-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    overflow-x: auto;
    margin-bottom: 16px;
  }
  .tree-root { display: flex; flex-direction: column; align-items: center; }

  .tree-node-wrap {
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }

  .tree-node {
    border-radius: var(--radius);
    padding: 10px 16px;
    min-width: 200px; max-width: 280px;
    text-align: center;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
    box-shadow: var(--shadow);
    position: relative;
    user-select: none;
  }
  .tree-node:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

  /* node types */
  .node-trigger {
    background: var(--bg2);
    border-color: var(--border2);
    color: var(--text);
  }
  .node-nonverbal {
    background: #EEF3F0;
    border-color: #7DB89A;
    color: #2D6B52;
  }
  .node-response {
    background: var(--purple-bg);
    border-color: #AFA9EC;
    color: var(--purple);
  }
  .node-response.verified {
    background: var(--teal-bg);
    border-color: #5DCAA5;
    color: var(--teal);
  }
  .node-end {
    background: var(--teal-bg);
    border-color: #5DCAA5;
    color: var(--teal);
  }
  .node-unclear {
    background: var(--amber-bg);
    border-color: #EF9F27;
    color: var(--amber);
  }
  .node-dimmed { opacity: 0.4; }

  .node-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 4px; opacity: 0.7;
  }
  .node-text { font-size: 13px; line-height: 1.5; }
  .node-sub { font-size: 11px; margin-top: 4px; opacity: 0.7; line-height: 1.4; }
  .node-energy {
    position: absolute; top: -8px; right: -8px;
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--card);
  }
  .ne-low  { background: var(--teal-bg);  color: var(--teal); }
  .ne-mid  { background: var(--amber-bg); color: var(--amber); }
  .ne-high { background: var(--coral-bg); color: var(--coral); }

  /* connector lines */
  .tree-connector {
    width: 1px; height: 24px;
    background: var(--border2);
    margin: 0 auto;
  }
  .tree-connector-h {
    height: 1px;
    background: var(--border2);
    align-self: flex-start;
    margin-top: 12px;
  }

  .tree-children {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    position: relative;
  }
  .tree-children::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: var(--border2);
  }
  .tree-child-wrap {
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .tree-child-wrap::before {
    content: '';
    width: 1px; height: 24px;
    background: var(--border2);
    display: block;
  }

 /* collapsed indicator */
  .node-collapsed-hint {
    font-size: 11px; color: var(--text3);
    margin-top: 4px;
    cursor: pointer;
  }
  .node-collapse-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    background: none; cursor: pointer;
    font-size: 11px; color: var(--text3);
    margin-top: 6px;
    transition: all 0.12s;
  }
  .node-collapse-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* variant panel */
  .variant-panel {
    background: var(--purple-bg);
    border: 1px solid #AFA9EC;
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-top: 10px;
    min-width: 220px; max-width: 300px;
    display: none;
  }
  .variant-panel.open { display: block; }
  .variant-panel-title {
    font-size: 11px; font-weight: 600; color: var(--purple);
    letter-spacing: 0.05em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .variant-item {
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .variant-item:hover { background: var(--card); border-color: #AFA9EC; }
  .variant-item.active { background: var(--card); border-color: var(--purple); color: var(--purple); font-weight: 500; }
  .variant-add {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .variant-input {
    flex: 1; padding: 5px 8px;
    border: 1px solid #AFA9EC;
    border-radius: var(--radius-sm);
    background: var(--card);
    font-size: 12px; color: var(--text);
    font-family: var(--font-ui);
  }
  .variant-input:focus { outline: none; border-color: var(--purple); }
  .variant-save-btn {
    padding: 5px 10px;
    border: none; border-radius: var(--radius-sm);
    background: var(--purple); color: white;
    font-size: 12px; cursor: pointer;
    white-space: nowrap;
  }
  .variant-save-btn:hover { opacity: 0.85; }

  /* unclear panel */
  .unclear-panel {
    background: var(--amber-bg);
    border: 1px solid #EF9F27;
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 12px;
    max-width: 400px;
    display: none;
  }
  .unclear-panel.open { display: block; }
  .unclear-panel-title {
    font-size: 12px; font-weight: 600; color: var(--amber);
    margin-bottom: 10px; letter-spacing: 0.04em;
  }
  .clarify-item {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    margin-bottom: 6px;
    font-size: 13px; color: var(--text);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.12s;
  }
  .clarify-item:hover { border-color: var(--amber); background: #FFFBF3; }
  .clarify-item:last-child { margin-bottom: 0; }

  /* ── BOTTOM LOG ── */
  .sim-log-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 16px;
  }
  .log-section-title {
    font-size: 13px; font-weight: 500; color: var(--text2);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .log-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .form-select, .form-input {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-size: 13px; color: var(--text);
    font-family: var(--font-ui);
    transition: border-color 0.12s;
  }
  .form-select:focus, .form-input:focus {
    outline: none; border-color: var(--accent);
  }
  .log-submit {
    padding: 7px 16px;
    background: var(--accent);
    color: white;
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; cursor: pointer;
    transition: opacity 0.12s;
    white-space: nowrap;
  }
  .log-submit:hover { opacity: 0.88; }

  .log-list { margin-top: 14px; }
  .log-entry {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-date { font-size: 11px; color: var(--text3); min-width: 80px; }
  .log-scene { color: var(--text); flex: 1; }
  .log-note { font-size: 12px; color: var(--text2); flex: 1; }
  .log-del { border: none; background: none; color: var(--text3); cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .log-del:hover { color: var(--coral); background: var(--coral-bg); }

  /* ── RULES PAGE ── */
  .rules-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .rules-add-card, .rules-list-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .section-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 16px; }
  .form-textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-size: 13px; color: var(--text);
    font-family: var(--font-ui);
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.12s;
  }
  .form-textarea:focus { outline: none; border-color: var(--accent); }
  .add-rule-btn {
    margin-top: 10px;
    padding: 7px 16px;
    background: var(--accent);
    color: white; border: none;
    border-radius: var(--radius-sm);
    font-size: 13px; cursor: pointer;
    transition: opacity 0.12s;
  }
  .add-rule-btn:hover { opacity: 0.88; }

  .rule-item {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    background: var(--bg);
    position: relative;
  }
  .rule-item-cat {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    margin-bottom: 5px;
  }
  .rule-item-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .rule-item-del {
    position: absolute; top: 8px; right: 8px;
    border: none; background: none;
    color: var(--text3); cursor: pointer;
    font-size: 14px; padding: 2px 5px; border-radius: 4px;
  }
  .rule-item-del:hover { color: var(--coral); background: var(--coral-bg); }

  /* ── UTILITIES ── */
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 13px; line-height: 2;
  }
  .divider {
    height: 1px; background: var(--border);
    margin: 16px 0;
  }
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .badge-verified { background: var(--teal-bg); color: var(--teal); }
  .badge-new { background: var(--purple-bg); color: var(--purple); }

  /* add node button */
  .add-node-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border: 1px dashed var(--border2);
    border-radius: 20px;
    background: none; cursor: pointer;
    font-size: 11px; color: var(--text3);
    margin-top: 8px;
    transition: all 0.12s;
  }
  .add-node-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  /* modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    width: 480px; max-width: 90vw;
    box-shadow: var(--shadow-md);
  }
  .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-secondary {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: none; cursor: pointer;
    font-size: 13px; color: var(--text2);
    transition: all 0.12s;
  }
  .btn-secondary:hover { background: var(--bg2); }
  .btn-primary {
    padding: 7px 16px;
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; cursor: pointer;
    transition: opacity 0.12s;
  }
  .btn-primary:hover { opacity: 0.88; }

  .node-legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 16px; font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text2); }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
  }

  /* search */
  .search-input {
    width: 100%;
    padding: 7px 10px 7px 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-size: 13px; color: var(--text);
    font-family: var(--font-ui);
    transition: border-color 0.12s;
    margin-bottom: 12px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute; left: 8px; top: 50%; transform: translateY(-60%);
    font-size: 13px; color: var(--text3); pointer-events: none;
  }

  /* path highlight */
  .tree-node.path-active {
    outline: 2.5px solid var(--accent);
    outline-offset: 2px;
    box-shadow: 0 0 0 4px var(--accent-bg);
  }
  .tree-connector.path-active,
  .tree-connector-h.path-active {
    background: var(--accent);
  }

  /* AI chat modal */
  .chat-modal {
    width: 560px; max-width: 95vw;
    max-height: 80vh;
    display: flex; flex-direction: column;
  }
  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 12px 0;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 200px; max-height: 380px;
  }
  .chat-bubble {
    max-width: 80%;
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 13px; line-height: 1.55;
  }
  .chat-bubble.them {
    background: var(--bg2);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 3px;
    color: var(--text);
  }
  .chat-bubble.me {
    background: var(--accent);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }
  .chat-bubble.thinking {
    background: var(--bg2); border: 1px dashed var(--border2);
    color: var(--text3); font-style: italic;
    align-self: flex-start;
  }
  .chat-input-row {
    display: flex; gap: 8px; margin-top: 12px;
    border-top: 1px solid var(--border); padding-top: 12px;
  }
  .chat-input {
    flex: 1; padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px; font-family: var(--font-ui);
    color: var(--text); background: var(--bg);
    resize: none; min-height: 38px; max-height: 100px;
  }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .chat-send-btn {
    padding: 8px 16px;
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; cursor: pointer;
    white-space: nowrap; align-self: flex-end;
  }
  .chat-send-btn:hover { opacity: 0.88; }
  .chat-send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .chat-hint {
    font-size: 11px; color: var(--text3);
    margin-bottom: 8px; line-height: 1.5;
  }

  /* scroll hint */
  .scroll-hint {
    text-align: center; font-size: 11px; color: var(--text3);
    padding: 6px; margin-bottom: 8px;
  }

  @media (max-width: 900px) {
    .library-layout { grid-template-columns: 1fr; }
    .filter-panel { position: static; display: flex; flex-wrap: wrap; gap: 16px; }
    .rules-layout { grid-template-columns: 1fr; }
    .log-form { grid-template-columns: 1fr 1fr; }
  }

  /* ── MOBILE FILTER BAR ── */
  .mobile-filter-bar {
    display: none;
  }
  .mobile-filter-scroll {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 0 0 8px 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .mobile-filter-scroll::-webkit-scrollbar { display: none; }
  .mobile-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 13px; color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
  }
  .mobile-chip.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  .mobile-chip.culture-active {
    background: #EEF3F0;
    border-color: #7DB89A;
    color: #2D6B52;
  }

  /* ── MOBILE STEP FLOW ── */
  .mobile-step-flow {
    display: none;
    flex-direction: column;
    gap: 0;
    padding-bottom: 20px;
  }

  .step-layer {
    animation: stepIn 0.2s ease;
  }
  @keyframes stepIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-context {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 14px 16px;
    background: var(--bg2);
    border-left: 3px solid var(--border2);
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    font-size: 13px; color: var(--text2);
    line-height: 1.5;
  }
  .step-context-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--text3);
    margin-bottom: 3px;
  }
  .step-context.type-trigger  { border-color: var(--border2); background: var(--bg2); }
  .step-context.type-nonverbal { border-color: #7DB89A; background: #EEF3F0; color: #2D6B52; }
  .step-context.type-unclear  { border-color: #EF9F27; background: var(--amber-bg); }

  .step-options-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    color: var(--text3); text-transform: uppercase;
    margin-bottom: 8px; padding: 0 2px;
  }

  .step-option {
    display: flex; align-items: flex-start; gap: 12px;
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 8px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    box-shadow: var(--shadow);
    position: relative;
  }
  .step-option:active { transform: scale(0.98); }
  .step-option:hover  { border-color: var(--accent); box-shadow: var(--shadow-md); }
  .step-option.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .step-option.type-response  { border-left: 3px solid var(--purple); }
  .step-option.type-trigger   { border-left: 3px solid var(--border2); }
  .step-option.type-nonverbal { border-left: 3px solid #7DB89A; }
  .step-option.type-end       { border-left: 3px solid var(--teal); background: var(--teal-bg); border-color: #5DCAA5; }
  .step-option.type-unclear   { border-left: 3px solid #EF9F27; background: var(--amber-bg); border-color: #EF9F27; }
  .step-option.verified { border-color: var(--teal); }
  .step-option.dimmed { opacity: 0.38; pointer-events: none; }

  .step-option-icon {
    font-size: 16px; flex-shrink: 0; margin-top: 1px;
  }
  .step-option-body { flex: 1; }
  .step-option-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--text3);
    margin-bottom: 3px;
  }
  .step-option-text {
    font-size: 14px; color: var(--text); line-height: 1.5;
    font-weight: 500;
  }
  .step-option-sub {
    font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.4;
  }
  .step-option-badges {
    display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
  }
  .step-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600;
  }
  .step-badge-verified { background: var(--teal-bg); color: var(--teal); }
  .step-badge-energy-low  { background: var(--teal-bg);  color: var(--teal); }
  .step-badge-energy-mid  { background: var(--amber-bg); color: var(--amber); }
  .step-badge-energy-high { background: var(--coral-bg); color: var(--coral); }
  .step-chevron {
    flex-shrink: 0; color: var(--text3); font-size: 16px; align-self: center;
  }

  .step-end-card {
    padding: 14px 16px;
    background: var(--teal-bg);
    border: 1.5px solid #5DCAA5;
    border-radius: var(--radius);
    font-size: 14px; color: var(--teal);
    font-weight: 500;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }

  .step-actions {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin: 10px 0 16px;
  }
  .step-action-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card); cursor: pointer;
    font-size: 12px; color: var(--text2);
    transition: all 0.12s;
    display: flex; align-items: center; gap: 5px;
  }
  .step-action-btn:hover { background: var(--bg2); }
  .step-action-btn.verified { color: var(--teal); border-color: var(--teal); background: var(--teal-bg); }

  .step-divider {
    display: flex; align-items: center; gap: 8px;
    margin: 4px 0 12px;
    color: var(--text3); font-size: 11px;
  }
  .step-divider::before, .step-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .step-reset-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
    background: none; cursor: pointer;
    font-size: 13px; color: var(--text3);
    transition: all 0.12s;
  }
  .step-reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .step-clarify-list {
    background: var(--amber-bg);
    border: 1px solid #EF9F27;
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
  }
  .step-clarify-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    color: var(--amber); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .step-clarify-item {
    padding: 10px 12px;
    background: var(--card); border-radius: var(--radius-sm);
    margin-bottom: 6px; font-size: 13px; color: var(--text);
    border: 1px solid var(--border); cursor: pointer;
    transition: all 0.12s;
  }
  .step-clarify-item:last-child { margin-bottom: 0; }
  .step-clarify-item:active { background: #FFFBF3; border-color: var(--amber); }

  /* variant sheet for mobile */
  .step-variant-sheet {
    background: var(--purple-bg);
    border: 1px solid #AFA9EC;
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
  }
  .step-variant-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    color: var(--purple); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .step-variant-item {
    padding: 10px 12px;
    background: var(--card); border-radius: var(--radius-sm);
    margin-bottom: 6px; font-size: 13px; color: var(--text);
    border: 1px solid transparent; cursor: pointer;
    transition: all 0.12s;
  }
  .step-variant-item.active { border-color: var(--purple); color: var(--purple); font-weight: 500; }

  @media (max-width: 680px) {
    .page { padding: 12px; }
    nav { padding: 0 12px; }

    .mobile-filter-bar { display: block; margin-bottom: 16px; }
    .filter-panel { display: none !important; }
    .scene-grid { grid-template-columns: 1fr; gap: 8px; }
    .library-layout { grid-template-columns: 1fr; gap: 0; }

    /* On mobile: hide desktop tree, show step flow */
    .tree-container { display: none; }
    .scroll-hint    { display: none; }
    .node-legend    { display: none; }
    .mobile-step-flow { display: flex; }

    .sim-header { flex-wrap: wrap; gap: 8px; }
    .sim-title { font-size: 15px; }
    .sim-tags  { margin-left: 0; }

    .energy-bar { flex-wrap: wrap; gap: 8px; }
    .energy-hint { width: 100%; margin-left: 0; }

    .log-form { grid-template-columns: 1fr; }

    /* bigger tap targets in library */
    .scene-card { padding: 14px; }
    .scene-card-title { font-size: 15px; }
  }
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed;inset:0;background:#FAF9F6;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;">
    <div style="font-family:'Georgia',serif;font-size:15px;color:#2A2825;margin-bottom:20px;letter-spacing:0.04em;">社交预演系统</div>
    <input id="lock-input" type="password" placeholder="密码" style="padding:8px 14px;border:1px solid #CCC9BF;border-radius:6px;background:#fff;font-size:14px;color:#2A2825;text-align:center;outline:none;width:140px;" onkeydown="if(event.key==='Enter')checkPw()">
    <div style="margin-top:10px;">
      <button onclick="checkPw()" style="padding:7px 20px;background:#5B7FA6;color:white;border:none;border-radius:6px;font-size:13px;cursor:pointer;">进入</button>
    </div>
    <div id="lock-err" style="font-size:12px;color:#C4503A;margin-top:8px;min-height:16px;"></div>
  </div>
</div>

<nav>
  <div class="nav-brand">社交预演 <span>simulator</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('library')">场景库</button>
    <button class="nav-tab" onclick="showPage('rules')">规则手册</button>
  </div>
</nav>

<!-- ══ PAGE: LIBRARY ══ -->
<div id="page-library" class="page active">

  <!-- Mobile filter bar (hidden on desktop) -->
  <div class="mobile-filter-bar">
    <div class="search-wrap" style="margin-bottom:10px;">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="scene-search-mobile" type="text" placeholder="搜索场景…" oninput="syncMobileSearch(this.value)" style="margin-bottom:0;">
    </div>
    <div class="mobile-filter-scroll" id="mobile-axis-chips">
      <span class="mobile-chip active" onclick="setAxisFilterMobile('all', this)">全部</span>
      <span class="mobile-chip" onclick="setAxisFilterMobile(0, this)">熟人一对一</span>
      <span class="mobile-chip" onclick="setAxisFilterMobile(1, this)">熟人多人</span>
      <span class="mobile-chip" onclick="setAxisFilterMobile(2, this)">不熟一对一</span>
      <span class="mobile-chip" onclick="setAxisFilterMobile(3, this)">不熟多人</span>
    </div>
    <div class="mobile-filter-scroll" style="margin-top:6px;" id="mobile-extra-chips">
      <span class="mobile-chip" id="mchip-energy-all" onclick="setEnergyFilterMobile('all', this)">全部能耗</span>
      <span class="mobile-chip" id="mchip-energy-low" onclick="setEnergyFilterMobile('low', this)">低耗能</span>
      <span class="mobile-chip" id="mchip-energy-mid" onclick="setEnergyFilterMobile('mid', this)">中等</span>
      <span class="mobile-chip" id="mchip-energy-high" onclick="setEnergyFilterMobile('high', this)">高耗能</span>
      <span class="mobile-chip" id="mchip-culture" onclick="toggleCultureMobile(this)">🏮 文化规则</span>
    </div>
  </div>

  <div class="library-layout">
    <div class="filter-panel">
      <div class="filter-section">
        <span class="filter-label">搜索</span>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="scene-search" type="text" placeholder="关键词，如「敬酒」…" oninput="renderSceneGrid()">
        </div>
      </div>
      <div class="filter-section">
        <span class="filter-label">熟悉程度</span>
        <button class="filter-btn active" onclick="setAxisFilter('all', this)">全部场景</button>
        <button class="filter-btn" onclick="setAxisFilter(0, this)">熟人一对一</button>
        <button class="filter-btn" onclick="setAxisFilter(1, this)">熟人多人</button>
        <button class="filter-btn" onclick="setAxisFilter(2, this)">不熟一对一</button>
        <button class="filter-btn" onclick="setAxisFilter(3, this)">不熟多人</button>
      </div>
      <div class="filter-section">
        <span class="filter-label">目的</span>
        <div id="purpose-filters">
          <span class="filter-tag" onclick="togglePurposeFilter(0, this)">联络感情</span>
          <span class="filter-tag" onclick="togglePurposeFilter(1, this)">任务办事</span>
          <span class="filter-tag" onclick="togglePurposeFilter(2, this)">被动应对</span>
          <span class="filter-tag" onclick="togglePurposeFilter(3, this)">主动发起</span>
        </div>
      </div>
      <div class="filter-section" id="energy-filter-section">
        <span class="filter-label">能量消耗</span>
        <button class="filter-btn" onclick="setEnergyFilter('all', this)">全部</button>
        <button class="filter-btn" onclick="setEnergyFilter('low', this)">低耗能</button>
        <button class="filter-btn" onclick="setEnergyFilter('mid', this)">中等</button>
        <button class="filter-btn" onclick="setEnergyFilter('high', this)">高耗能</button>
      </div>
      <div class="filter-section" id="culture-filter-section">
        <span class="filter-label">标签</span>
        <button class="filter-btn active" onclick="setCultureFilter(false, this)">全部</button>
        <button class="filter-btn" onclick="setCultureFilter(true, this)">🏮 文化规则</button>
      </div>
      <div class="divider"></div>
      <button class="filter-btn" onclick="openAddScene()" style="color:var(--accent);font-weight:500;">＋ 新建场景</button>
    </div>
    <div id="scene-grid" class="scene-grid"></div>
  </div>
</div>

<!-- ══ PAGE: SIMULATOR ══ -->
<div id="page-sim" class="page">
  <div class="sim-header">
    <button class="back-btn" onclick="showPage('library')">← 返回</button>
    <div class="sim-title" id="sim-title">场景名称</div>
    <div class="sim-tags" id="sim-tags"></div>
    <button class="back-btn" onclick="openChatModal()" style="margin-left:8px;background:var(--purple-bg);border-color:#AFA9EC;color:var(--purple);">💬 即兴练习</button>
  </div>

  <div class="energy-bar">
    <span class="energy-bar-label">今天的能量状态</span>
    <div class="energy-btns">
      <button class="energy-btn e-high" onclick="setEnergy('high', this)">高 ✦</button>
      <button class="energy-btn e-mid active" onclick="setEnergy('mid', this)">中</button>
      <button class="energy-btn e-low" onclick="setEnergy('low', this)">低 ↓</button>
    </div>
    <span class="energy-hint" id="energy-hint">显示所有路径</span>
  </div>

  <div class="node-legend">
    <span class="legend-item"><span class="legend-dot" style="background:#E8E6F0;border:1.5px solid #CCC9BF"></span>对方的话（触发）</span>
    <span class="legend-item"><span class="legend-dot" style="background:#EEF3F0;border:1.5px solid #7DB89A"></span>非言语信号（动作/表情）</span>
    <span class="legend-item"><span class="legend-dot" style="background:#EEEDFE;border:1.5px solid #AFA9EC"></span>我的回应选项</span>
    <span class="legend-item"><span class="legend-dot" style="background:#E1F5EE;border:1.5px solid #5DCAA5"></span>结束节点 / 已验证路径</span>
    <span class="legend-item"><span class="legend-dot" style="background:#FAEEDA;border:1.5px solid #EF9F27"></span>信号不明 — 澄清话术</span>
  </div>

  <div class="scroll-hint">← 场景较宽时可横向滚动 →</div>

  <div class="tree-container" id="tree-container">
    <div id="tree-root" class="tree-root"></div>
  </div>

  <!-- Mobile Step Flow (hidden on desktop) -->
  <div class="mobile-step-flow" id="mobile-step-flow"></div>

  <!-- Energy Log -->
  <div class="sim-log-section">
    <div class="log-section-title">
      📋 实际发生后记录
      <span style="font-size:11px;color:var(--text3);font-weight:400;">（走完一条路径后填写，积累数据）</span>
    </div>
    <div class="log-form">
      <div class="form-group">
        <label class="form-label">实际消耗</label>
        <select class="form-select" id="log-energy-select">
          <option value="">选择...</option>
          <option value="low">低 — 轻松</option>
          <option value="mid">中 — 有消耗</option>
          <option value="high">高 — 很疲惫</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">备注（可选）</label>
        <input class="form-input" id="log-note-input" type="text" placeholder="哪里出乎意料，或哪条路径有效…">
      </div>
      <button class="log-submit" onclick="saveLog()">保存记录</button>
    </div>
    <div id="log-list" class="log-list"></div>
  </div>
</div>

<!-- ══ PAGE: RULES ══ -->
<div id="page-rules" class="page">
  <div class="rules-layout">
    <div class="rules-add-card">
      <div class="section-title">添加规则</div>
      <div class="form-group" style="margin-bottom:10px">
        <label class="form-label">类别</label>
        <select class="form-select" id="rule-cat-select" style="width:100%">
          <option value="subtext">潜台词识别</option>
          <option value="turn">轮转信号</option>
          <option value="exit">退出方式</option>
          <option value="clarify">澄清话术</option>
          <option value="recover">事后恢复</option>
          <option value="culture">文化规则</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">规则内容</label>
        <textarea class="form-textarea" id="rule-text-input" placeholder="描述你发现的规律或有效的话术…例如：当对方说完一件事停顿超过2秒，通常是在等我回应。"></textarea>
      </div>
      <button class="add-rule-btn" onclick="addRule()">保存规则</button>
    </div>
    <div class="rules-list-card">
      <div class="section-title">我的规则手册 <span id="rules-count" style="font-size:12px;color:var(--text3);font-weight:400;"></span></div>
      <div id="rules-list"></div>
    </div>
  </div>
</div>

<!-- ══ ADD NODE MODAL ══ -->
<div class="modal-overlay" id="modal-add-node">
  <div class="modal">
    <div class="modal-title">在此处添加分支节点</div>
    <div class="form-group" style="margin-bottom:10px">
      <label class="form-label">节点类型</label>
      <select class="form-select" id="new-node-type" style="width:100%" onchange="toggleUnclearHint()">
        <option value="trigger">对方的话（触发）</option>
        <option value="nonverbal">对方的动作 / 非言语信号</option>
        <option value="response">我的回应</option>
        <option value="end">结束节点</option>
        <option value="unclear">信号不明（触发澄清话术）</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label class="form-label">内容</label>
      <textarea class="form-textarea" id="new-node-text" placeholder="输入节点文字…" style="min-height:60px"></textarea>
    </div>
    <div class="form-group" style="margin-bottom:10px">

function loadState() {
  try {
    const saved = localStorage.getItem('social-sim-v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.rules = parsed.rules || [];
      state.logs = parsed.logs || [];
      state.verifiedPaths = parsed.verifiedPaths || {};
      state.customVariants = parsed.customVariants || {};
      const savedCustom = (parsed.scenes || []).filter(s => s.custom);
      state.scenes = [...DEFAULT_SCENES, ...savedCustom];
    } else {
      state.scenes = [...DEFAULT_SCENES];
      state.rules = [...DEFAULT_CULTURE_RULES];
    }
  } catch(e) {
    state.scenes = [...DEFAULT_SCENES];
  }
}

function saveState() {
  const toSave = {
    scenes: state.scenes.filter(s => s.custom),
    rules: state.rules,
    logs: state.logs,
    verifiedPaths: state.verifiedPaths,
    customVariants: state.customVariants || {},
  };
  localStorage.setItem('social-sim-v2', JSON.stringify(toSave));
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const tabs = { library: 0, sim: -1, rules: 1 };
  const idx = tabs[name];
  if (idx >= 0) document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  if (name === 'library') renderSceneGrid();
  if (name === 'rules') renderRules();
}

// ══════════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════════
function setAxisFilter(val, btn) {
  state.axisFilter = val;
  document.querySelectorAll('.filter-panel .filter-btn').forEach(b => {
    if (['全部场景','熟人一对一','熟人多人','不熟一对一','不熟多人'].some(l => b.textContent.includes(l))) {
      b.classList.remove('active');
    }
  });
  btn.classList.add('active');
  renderSceneGrid();
}

function togglePurposeFilter(idx, el) {
  el.classList.toggle('active');
  if (state.purposeFilters.includes(idx)) {
    state.purposeFilters = state.purposeFilters.filter(x => x !== idx);
  } else {
    state.purposeFilters.push(idx);
  }
  renderSceneGrid();
}

function setEnergyFilter(val, btn) {
  state.energyFilter = val;
  document.querySelectorAll('#energy-filter-section .filter-btn').forEach(b => {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  renderSceneGrid();
}

function filterScenes() {
  const query = (document.getElementById('scene-search')?.value || '').trim().toLowerCase();
  return state.scenes.filter(s => {
    if (state.axisFilter !== 'all' && s.axis !== state.axisFilter) return false;
    if (state.purposeFilters.length > 0 && !state.purposeFilters.some(p => s.purposes.includes(p))) return false;
    if (state.energyFilter !== 'all' && s.energy !== state.energyFilter) return false;
    if (state.cultureFilter && !s.culture) return false;
    if (query && !s.title.toLowerCase().includes(query) && !s.desc.toLowerCase().includes(query)) return false;
    return true;
  });
}

function setCultureFilter(val, btn) {
  state.cultureFilter = val;
  document.querySelectorAll('#culture-filter-section .filter-btn').forEach(b => {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  renderSceneGrid();
}

// ══════════════════════════════════════════════
// SCENE GRID
// ══════════════════════════════════════════════
function renderSceneGrid() {
  const grid = document.getElementById('scene-grid');
  const scenes = filterScenes();
  if (scenes.length === 0) {
    grid.innerHTML = '<div class="empty-state">没有符合条件的场景<br>试试调整筛选条件，或新建一个场景。</div>';
    return;
  }
  grid.innerHTML = scenes.map(s => {
    const tags = s.purposes.map(p =>
      `<span class="tag ${PURPOSE_CLASS[p]}">${PURPOSE_LABELS[p]}</span>`
    ).join('');
    const energyTag = `<span class="tag tag-energy-${s.energy}">${ENERGY_LABELS[s.energy]}</span>`;
    const axisTag = `<span class="tag tag-axis">${AXIS_LABELS[s.axis]}</span>`;
    const logCount = state.logs.filter(l => l.sceneId === s.id).length;
    const logBadge = logCount > 0 ? `<span class="tag" style="background:var(--bg2);color:var(--text3);">记录 ${logCount} 次</span>` : '';
    const cultureBadge = s.culture ? `<span class="tag" style="background:#EEF3F0;color:#2D6B52;">🏮 文化规则</span>` : '';
    return `
      <div class="scene-card ${AXIS_CLASS[s.axis]}" onclick="openScene('${s.id}')">
        <div class="scene-card-title">${s.title}</div>
        <div class="scene-card-desc">${s.desc}</div>
        <div class="scene-card-tags">${axisTag}${energyTag}${tags}${cultureBadge}${logBadge}</div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// SIMULATOR
// ══════════════════════════════════════════════
function openScene(id) {
  const scene = state.scenes.find(s => s.id === id);
  if (!scene) return;
  state.currentSceneId = id;
  state.expandedNodes = {};
  document.getElementById('sim-title').textContent = scene.title;
  const tagHtml = [
    `<span class="tag tag-axis">${AXIS_LABELS[scene.axis]}</span>`,
    `<span class="tag tag-energy-${scene.energy}">${ENERGY_LABELS[scene.energy]}</span>`,
    ...scene.purposes.map(p => `<span class="tag ${PURPOSE_CLASS[p]}">${PURPOSE_LABELS[p]}</span>`)
  ].join('');
  document.getElementById('sim-tags').innerHTML = tagHtml;
  renderTree();
  renderLogList();
  showPage('sim');
  window.scrollTo(0, 0);
}

function setEnergy(level, btn) {
  state.currentEnergy = level;
  document.querySelectorAll('.energy-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const hints = { high:'显示所有路径，高耗能路径完全可用', mid:'显示所有路径', low:'低耗能路径高亮显示' };
  document.getElementById('energy-hint').textContent = hints[level];
  renderTree();
}

function renderTree_desktop_only(node, sceneId) {
  const root = document.getElementById('tree-root');
  root.innerHTML = '';
  root.appendChild(buildNodeEl(node, sceneId, null));
}

  '「这个我还没想清楚。」': ['「我需要再想想。」','「这个问题……我还没有答案。」'],
  '「你好，我是[名字]，[一句身份说明]。」': ['「你好，我是[名字]。」','「嗨，我是[名字]，很高兴认识你。」'],
  '「我理解那种感觉。」': ['「听起来确实不容易。」','「嗯，这种情况很难受。」'],
};

function buildNodeEl(node, sceneId, parentId) {
  const wrap = document.createElement('div');
  wrap.className = 'tree-node-wrap';
  wrap.id = 'wrap-' + node.id;

  const nodeEl = document.createElement('div');
  const isVerified = state.verifiedPaths[sceneId + ':' + node.id];
  let cls = 'tree-node ';
  if (node.type === 'trigger') cls += 'node-trigger';
  else if (node.type === 'nonverbal') cls += 'node-nonverbal';
  else if (node.type === 'response') cls += isVerified ? 'node-response verified' : 'node-response';
  else if (node.type === 'end') cls += 'node-end';
  else if (node.type === 'unclear') cls += 'node-unclear';
  if (state.currentEnergy === 'low' && node.energy === 'high') cls += ' node-dimmed';
  nodeEl.className = cls;

  const labelMap = { trigger:'对方说', nonverbal:'对方的动作', response:'我可以说', end:'结果', unclear:'信号不明' };
  const activeText = state.activeVariants[node.id] || node.text;
  let inner = `<div class="node-label">${labelMap[node.type] || ''}</div>`;
  inner += `<div class="node-text" id="nodetext-${node.id}">${activeText}</div>`;
  if (node.sub) inner += `<div class="node-sub">${node.sub}</div>`;
  if (isVerified) inner += `<div class="node-sub" style="color:var(--teal);margin-top:4px;">✓ 已验证有效</div>`;
  if (node.energy) {
    const sym = { low:'低耗', mid:'中耗', high:'高耗' };
    inner += `<div class="node-energy ne-${node.energy}">${sym[node.energy]}</div>`;
  }
  nodeEl.innerHTML = inner;
  nodeEl.onclick = (e) => {
    if (node.type === 'unclear') { handleNodeClick(node, sceneId); return; }
    highlightPath(node.id, sceneId);
  };
  wrap.appendChild(nodeEl);

  if (node.type === 'unclear') {
    const panel = document.createElement('div');
    panel.className = 'unclear-panel';
    panel.id = 'unclear-' + node.id;
    panel.innerHTML = `<div class="unclear-panel-title">澄清话术模板 — 直接调用</div>` +
      CLARIFY_TEMPLATES.map(t => `<div class="clarify-item" onclick="copyToClipboard('${t.replace(/'/g,"\\'")}', this)">${t}</div>`).join('');
    wrap.appendChild(panel);
  }

  if (node.type === 'response') {
    const variantPanel = buildVariantPanel(node, sceneId);
    wrap.appendChild(variantPanel);
  }

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;';

  if (node.type !== 'end') {
    const addBtn = document.createElement('button');
    addBtn.className = 'add-node-btn';
    addBtn.innerHTML = '＋ 添加分支';
    addBtn.onclick = (e) => { e.stopPropagation(); openAddNodeModal(node.id, sceneId); };
    btnRow.appendChild(addBtn);
  }

  if (node.type === 'response') {
    const vBtn = document.createElement('button');
    vBtn.className = 'add-node-btn';
    if (isVerified) { vBtn.style.color = 'var(--teal)'; vBtn.style.borderColor = 'var(--teal)'; }
    vBtn.innerHTML = isVerified ? '✓ 已验证' : '☆ 标为已验证';
    vBtn.onclick = (e) => { e.stopPropagation(); toggleVerified(node.id, sceneId); };
    btnRow.appendChild(vBtn);

    const varBtn = document.createElement('button');
    varBtn.className = 'add-node-btn';
    varBtn.innerHTML = '≡ 换个说法';
    varBtn.onclick = (e) => {
      e.stopPropagation();
      const vp = document.getElementById('variant-' + node.id);
      if (vp) vp.classList.toggle('open');
    };
    btnRow.appendChild(varBtn);
  }

  wrap.appendChild(btnRow);

  if (node.children && node.children.length > 0) {
    const expanded = state.expandedNodes[node.id] !== false;
    if (expanded) {
      const conn = document.createElement('div');
      conn.className = 'tree-connector';
      wrap.appendChild(conn);
      if (node.children.length === 1) {
        wrap.appendChild(buildNodeEl(node.children[0], sceneId, node.id));
      } else {
        const childRow = document.createElement('div');
        childRow.className = 'tree-children';
        node.children.forEach(child => {
          const cw = document.createElement('div');
          cw.className = 'tree-child-wrap';
          cw.appendChild(buildNodeEl(child, sceneId, node.id));
          childRow.appendChild(cw);
        });
        wrap.appendChild(childRow);
      }
      const collapseBtn = document.createElement('button');
      collapseBtn.className = 'node-collapse-btn';
      collapseBtn.textContent = '▴ 收起';
      collapseBtn.onclick = (e) => { e.stopPropagation(); state.expandedNodes[node.id] = false; renderTree(); };
      wrap.appendChild(collapseBtn);
    } else {
      const hint = document.createElement('div');
      hint.className = 'node-collapsed-hint';
      hint.textContent = `▸ ${node.children.length} 个分支`;
      hint.onclick = (e) => { e.stopPropagation(); state.expandedNodes[node.id] = true; renderTree(); };
      wrap.appendChild(hint);
    }
  }
  return wrap;
}

function buildVariantPanel(node, sceneId) {
  const panel = document.createElement('div');
  panel.className = 'variant-panel';
  panel.id = 'variant-' + node.id;
  panel.onclick = (e) => e.stopPropagation();

  const presets = NODE_VARIANTS[node.text] || [];
  const allVariants = [node.text, ...presets];

  const title = document.createElement('div');
  title.className = 'variant-panel-title';
  title.textContent = '换个说法（同一个意思）';
  panel.appendChild(title);

  function renderVariants() {
    const existing = panel.querySelectorAll('.variant-item');
    existing.forEach(el => el.remove());
    const active = state.activeVariants[node.id] || node.text;
    const customList = state.customVariants && state.customVariants[node.id] || [];
    const combined = [...new Set([...allVariants, ...customList])];
    combined.forEach(v => {
      const item = document.createElement('div');
      item.className = 'variant-item' + (v === active ? ' active' : '');
      item.textContent = v;
      item.onclick = () => {
        state.activeVariants[node.id] = v;
        const textEl = document.getElementById('nodetext-' + node.id);
        if (textEl) textEl.textContent = v;
        panel.querySelectorAll('.variant-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      };
      panel.insertBefore(item, addRow);
    });
  }

  const addRow = document.createElement('div');
  addRow.className = 'variant-add';
  const input = document.createElement('input');
  input.className = 'variant-input';
  input.placeholder = '添加你自己的说法…';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'variant-save-btn';
  saveBtn.textContent = '加入';
  saveBtn.onclick = () => {
    const val = input.value.trim();
    if (!val) return;
    if (!state.customVariants) state.customVariants = {};
    if (!state.customVariants[node.id]) state.customVariants[node.id] = [];
    state.customVariants[node.id].push(val);
    input.value = '';
    renderVariants();
  };
  addRow.appendChild(input);
  addRow.appendChild(saveBtn);
  panel.appendChild(addRow);

  renderVariants();
  return panel;
}

function handleNodeClick(node, sceneId) {
  if (node.type === 'unclear') {
    const panel = document.getElementById('unclear-' + node.id);
    if (panel) panel.classList.toggle('open');
  }
}

function toggleVerified(nodeId, sceneId) {
  const key = sceneId + ':' + nodeId;
  state.verifiedPaths[key] = !state.verifiedPaths[key];
  saveState();
  renderTree();
}

function copyToClipboard(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = el.textContent;
    el.textContent = '✓ 已复制';
    el.style.color = 'var(--teal)';
    setTimeout(() => { el.textContent = orig; el.style.color = ''; }, 1500);
  });
}

  const text = document.getElementById('new-node-text').value.trim();

  const type = document.getElementById('new-node-type').value;
  const sub = document.getElementById('new-node-sub').value.trim();

  const newNode = { id: 'u' + Date.now(), type, text, sub: sub || '', energy, children: [] };

    if (node.children) { for (const c of node.children) if (insertNode(c)) return true; }
    return false;
  }
  insertNode(scene.tree);
  saveState();
  closeModal();
  renderTree();
}

function saveLog() {

const CAT_LABELS = {
  subtext:'潜台词识别', turn:'轮转信号', exit:'退出方式',
  clarify:'澄清话术', recover:'事后恢复', culture:'文化规则', other:'其他'
};
const CAT_COLORS = {
  subtext:'var(--purple)', turn:'var(--accent)', exit:'var(--teal)',
  clarify:'var(--amber)', recover:'var(--coral)', culture:'#2D6B52', other:'var(--text3)'
};

function deleteRule(id) {
  state.rules = state.rules.filter(r => r.id !== id);

function renderRules() {
  const list = document.getElementById('rules-list');
  const count = document.getElementById('rules-count');
  count.textContent = state.rules.length ? `（${state.rules.length} 条）` : '';
  if (state.rules.length === 0) {
    list.innerHTML = '<div class="empty-state">还没有规则。<br>走完一个场景后，把发现的规律记录在这里。</div>';
    return;
  }
  const grouped = {};
  state.rules.forEach(r => {
    if (!grouped[r.cat]) grouped[r.cat] = [];
    grouped[r.cat].push(r);
  });
  let html = '';
  for (const [cat, rules] of Object.entries(grouped)) {
    html += `<div style="font-size:11px;font-weight:600;letter-spacing:0.05em;color:${CAT_COLORS[cat]};margin:12px 0 6px;text-transform:uppercase;">${CAT_LABELS[cat]}</div>`;
    rules.forEach(r => {
      html += `<div class="rule-item"><div class="rule-item-text">${r.text}</div><button class="rule-item-del" onclick="deleteRule(${r.id})">✕</button></div>`;
    });
  }
  list.innerHTML = html;
}

// PATH HIGHLIGHT
// ══════════════════════════════════════════════
function highlightPath(targetId, sceneId) {
  // Clear existing highlights
  document.querySelectorAll('.tree-node.path-active').forEach(el => el.classList.remove('path-active'));

  const scene = state.scenes.find(s => s.id === sceneId);
  if (!scene) return;

  // Find path from root to targetId
  const path = [];
  function findPath(node, target, currentPath) {
    const newPath = [...currentPath, node.id];
    if (node.id === target) { path.push(...newPath); return true; }
    if (node.children) {
      for (const c of node.children) {
        if (findPath(c, target, newPath)) return true;
      }
    }
    return false;
  }
  findPath(scene.tree, targetId, []);

  // Highlight all nodes in path
  path.forEach(id => {
    const wrap = document.getElementById('wrap-' + id);
    if (wrap) {
      const nodeEl = wrap.querySelector('.tree-node');
      if (nodeEl) nodeEl.classList.add('path-active');
    }
  });
}

let chatHistory = [];

function openChatModal() {
  const scene = state.scenes.find(s => s.id === state.currentSceneId);
  if (!scene) return;
  document.getElementById('chat-scene-name').textContent = scene.title;
  document.getElementById('chat-hint').textContent =
    `场景：${scene.desc} — Claude 会扮演「对方」，你来练习回应。`;
  if (chatHistory.length === 0) initChat(scene);
  document.getElementById('modal-chat').classList.add('open');
  setTimeout(() => document.getElementById('chat-input').focus(), 100);
}

function closeChatModal() {
  document.getElementById('modal-chat').classList.remove('open');
}

function resetChat() {
  chatHistory = [];
  document.getElementById('chat-messages').innerHTML = '';
  const scene = state.scenes.find(s => s.id === state.currentSceneId);
  if (scene) initChat(scene);
}

function initChat(scene) {
  chatHistory = [];
  // Extract trigger text from root node as opening line
  const openingText = scene.tree.text;
  addBubble('them', openingText);
  chatHistory.push({ role: 'assistant', content: openingText });
}

function addBubble(who, text) {
  const container = document.getElementById('chat-messages');
  const bubble = document.createElement('div');
  bubble.className = `chat-bubble ${who}`;
  bubble.textContent = text;
  container.appendChild(bubble);
  container.scrollTop = container.scrollHeight;
  return bubble;
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  const sendBtn = document.getElementById('chat-send-btn');
  input.value = '';
  sendBtn.disabled = true;

  const scene = state.scenes.find(s => s.id === state.currentSceneId);
  addBubble('me', text);
  chatHistory.push({ role: 'user', content: text });

  const thinkingBubble = addBubble('thinking', '对方正在想…');

  // Build system prompt
  const systemPrompt = `你正在扮演一个真实的人，参与一段社交对话练习。场景是：「${scene.title}」。
背景：${scene.desc}
你的角色是对方（不是AI）。用自然的中文口语回应，1-3句话，符合场景的语气（${scene.axis <= 1 ? '熟人之间' : '不太熟的人之间'}）。
不要解释你在做什么，不要用括号描述动作，直接说话。如果对话自然结束，用一句简短的结束语收尾。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: chatHistory,
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || '…';
    thinkingBubble.remove();
    addBubble('them', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    thinkingBubble.remove();
    addBubble('thinking', '网络错误，请重试。');
  }

  sendBtn.disabled = false;
  input.focus();
}

// ══════════════════════════════════════════════
// MOBILE STEP FLOW
// ══════════════════════════════════════════════
const isMobile = () => window.innerWidth <= 680;

// mobileStepStack: array of { node, selectedChildId }
let mobileStepStack = [];

function renderTree() {
  const scene = state.scenes.find(s => s.id === state.currentSceneId);
  if (!scene) return;

  if (isMobile()) {
    document.getElementById('tree-container').style.display = 'none';
    document.getElementById('mobile-step-flow').style.display = 'flex';
    renderMobileFlow(scene);
  } else {
    document.getElementById('tree-container').style.display = '';
    document.getElementById('mobile-step-flow').style.display = 'none';
    const root = document.getElementById('tree-root');
    root.innerHTML = '';
    root.appendChild(buildNodeEl(scene.tree, scene.id, null));
  }
}

function renderMobileFlow(scene) {
  const container = document.getElementById('mobile-step-flow');
  container.innerHTML = '';
  mobileStepStack = [];

  // Start from root
  buildMobileStep(scene.tree, scene.id, container);
}

function buildMobileStep(node, sceneId, container) {
  // Push to stack
  mobileStepStack.push({ nodeId: node.id });

  const layer = document.createElement('div');
  layer.className = 'step-layer';
  layer.id = 'step-layer-' + node.id;

  // ── Context card (show what's happening) ──
  const ctx = document.createElement('div');
  ctx.className = `step-context type-${node.type}`;
  const ctxTypeLabel = { trigger:'对方说', nonverbal:'对方的动作', response:'我选择了', end:'结果', unclear:'信号不明' };
  ctx.innerHTML = `<div><div class="step-context-label">${ctxTypeLabel[node.type] || ''}</div><div style="font-size:14px;font-weight:500;color:var(--text);line-height:1.5;">${state.activeVariants[node.id] || node.text}</div>${node.sub ? `<div style="font-size:12px;margin-top:4px;opacity:0.8;">${node.sub}</div>` : ''}</div>`;
  layer.appendChild(ctx);

  // ── Action buttons for response nodes ──
  if (node.type === 'response') {
    const isVerified = state.verifiedPaths[sceneId + ':' + node.id];
    const actions = document.createElement('div');
    actions.className = 'step-actions';

    const vBtn = document.createElement('button');
    vBtn.className = 'step-action-btn' + (isVerified ? ' verified' : '');
    vBtn.innerHTML = isVerified ? '✓ 已验证有效' : '☆ 标为已验证';
    vBtn.onclick = () => { toggleVerified(node.id, sceneId); renderTree(); };
    actions.appendChild(vBtn);

    // Variants
    const presets = NODE_VARIANTS[node.text] || [];
    const customList = (state.customVariants && state.customVariants[node.id]) || [];
    const allV = [...new Set([node.text, ...presets, ...customList])];
    if (allV.length > 1) {
      const varBtn = document.createElement('button');
      varBtn.className = 'step-action-btn';
      varBtn.innerHTML = '≡ 换个说法';
      varBtn.onclick = () => {
        const existing = document.getElementById('varsheet-' + node.id);
        if (existing) { existing.remove(); return; }
        const sheet = buildMobileVariantSheet(node, sceneId, allV);
        actions.parentNode.insertBefore(sheet, actions.nextSibling);
      };
      actions.appendChild(varBtn);
    }

    layer.appendChild(actions);
  }

  // ── Unclear: show clarify templates ──
  if (node.type === 'unclear') {
    const cl = document.createElement('div');
    cl.className = 'step-clarify-list';
    cl.innerHTML = `<div class="step-clarify-title">澄清话术 — 点击复制</div>` +
      CLARIFY_TEMPLATES.map(t =>
        `<div class="step-clarify-item" onclick="copyToClipboard('${t.replace(/'/g,"\\'")}', this)">${t}</div>`
      ).join('');
    layer.appendChild(cl);
  }

  // ── Children / options ──
  if (!node.children || node.children.length === 0) {
    // End state
    const endCard = document.createElement('div');
    endCard.className = 'step-end-card';
    endCard.innerHTML = `<span>✓</span><span>对话路径完成</span>`;
    layer.appendChild(endCard);

    const resetBtn = document.createElement('button');
    resetBtn.className = 'step-reset-btn';
    resetBtn.innerHTML = '↺ 从头再走一遍';
    resetBtn.onclick = () => renderMobileFlow(state.scenes.find(s => s.id === sceneId));
    layer.appendChild(resetBtn);

    container.appendChild(layer);
    return;
  }

  // Multiple or single children → show as options
  const optLabel = document.createElement('div');
  optLabel.className = 'step-options-label';
  const labelByType = { trigger:'接下来可能发生', nonverbal:'非言语信号', response:'我可以怎么回应', end:'结果', unclear:'情况不明' };
  const nextTypes = [...new Set(node.children.map(c => c.type))];
  optLabel.textContent = nextTypes.length === 1 ? (labelByType[nextTypes[0]] || '接下来') : '接下来';
  layer.appendChild(optLabel);

  const divider = document.createElement('div');
  divider.className = 'step-divider';
  divider.textContent = node.children.length > 1 ? `${node.children.length} 个选项` : '';
  layer.appendChild(divider);

  node.children.forEach(child => {
    const isVerifiedChild = state.verifiedPaths[sceneId + ':' + child.id];
    const isDimmed = state.currentEnergy === 'low' && child.energy === 'high';

    const opt = document.createElement('button');
    let optCls = `step-option type-${child.type}`;
    if (isVerifiedChild) optCls += ' verified';
    if (isDimmed) optCls += ' dimmed';
    opt.className = optCls;

    const icons = { trigger:'💬', nonverbal:'👁', response:'🗣', end:'✓', unclear:'❓' };
    const optLabels = { trigger:'对方说', nonverbal:'对方的动作', response:'我可以说', end:'结果', unclear:'信号不明' };

    const activeText = state.activeVariants[child.id] || child.text;
    const energyBadge = child.energy ? `<span class="step-badge step-badge-energy-${child.energy}">${{low:'低耗',mid:'中耗',high:'高耗'}[child.energy]}</span>` : '';
    const verifiedBadge = isVerifiedChild ? `<span class="step-badge step-badge-verified">✓ 已验证</span>` : '';
    const hasSub = child.sub ? `<div class="step-option-sub">${child.sub}</div>` : '';
    const hasBadges = (energyBadge || verifiedBadge) ? `<div class="step-option-badges">${verifiedBadge}${energyBadge}</div>` : '';

    opt.innerHTML = `
      <span class="step-option-icon">${icons[child.type] || '→'}</span>
      <span class="step-option-body">
        <span class="step-option-label">${optLabels[child.type] || ''}</span>
        <span class="step-option-text">${activeText}</span>
        ${hasSub}
        ${hasBadges}
      </span>
      ${child.type !== 'end' && child.children && child.children.length > 0 ? '<span class="step-chevron">›</span>' : ''}
    `;

    opt.onclick = () => {
      // Remove all layers after this one
      const existingNext = document.getElementById('step-layer-' + child.id);
      if (existingNext) {
        // If already expanded, collapse
        let toRemove = existingNext;
        while (toRemove) {
          const next = toRemove.nextSibling;
          toRemove.remove();
          toRemove = next;
        }
        opt.classList.remove('selected');
        return;
      }

      // Deselect siblings
      layer.querySelectorAll('.step-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');

      // Scroll to show new content
      setTimeout(() => {
        const newLayer = document.getElementById('step-layer-' + child.id);
        if (newLayer) newLayer.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 80);

      buildMobileStep(child, sceneId, container);
    };

    layer.appendChild(opt);
  });

  container.appendChild(layer);
}

function buildMobileVariantSheet(node, sceneId, allVariants) {
  const sheet = document.createElement('div');
  sheet.className = 'step-variant-sheet';
  sheet.id = 'varsheet-' + node.id;

  const title = document.createElement('div');
  title.className = 'step-variant-title';
  title.textContent = '换个说法';
  sheet.appendChild(title);

  const active = state.activeVariants[node.id] || node.text;
  allVariants.forEach(v => {
    const item = document.createElement('div');
    item.className = 'step-variant-item' + (v === active ? ' active' : '');
    item.textContent = v;
    item.onclick = () => {
      state.activeVariants[node.id] = v;
      // Update the context card text
      const ctx = document.querySelector(`#step-layer-${node.id} .step-context [style]`);
      // Re-render the whole flow to update
      const scene = state.scenes.find(s => s.id === sceneId);
      sheet.remove();
      // Find which step this is and update display
      const ctxDiv = document.querySelector(`#step-layer-${node.id} .step-context div div:last-child`);
      if (ctxDiv && ctxDiv.style.fontWeight === '500') ctxDiv.textContent = v;
      // Update the context bold text
      const ctxNode = document.querySelector(`#step-layer-${node.id} .step-context`);
      if (ctxNode) {
        const textEl = ctxNode.querySelector('[style*="font-weight"]');
        if (textEl) textEl.textContent = v;
      }
    };
    sheet.appendChild(item);
  });

  // Add custom variant
  const addRow = document.createElement('div');
  addRow.style.cssText = 'display:flex;gap:6px;margin-top:8px;';
  const inp = document.createElement('input');
  inp.className = 'variant-input';
  inp.placeholder = '写你自己的说法…';
  inp.style.cssText = 'flex:1;padding:8px 10px;border:1px solid #AFA9EC;border-radius:6px;font-size:13px;background:var(--card);color:var(--text);font-family:var(--font-ui);outline:none;';
  const saveB = document.createElement('button');
  saveB.className = 'variant-save-btn';
  saveB.textContent = '加入';
  saveB.style.cssText = 'padding:8px 12px;background:var(--purple);color:white;border:none;border-radius:6px;font-size:13px;cursor:pointer;';
  saveB.onclick = () => {
    const val = inp.value.trim();
    if (!val) return;
    if (!state.customVariants) state.customVariants = {};
    if (!state.customVariants[node.id]) state.customVariants[node.id] = [];
    state.customVariants[node.id].push(val);
    inp.value = '';
    allVariants.push(val);
    const newItem = document.createElement('div');
    newItem.className = 'step-variant-item';
    newItem.textContent = val;
    newItem.onclick = () => { state.activeVariants[node.id] = val; sheet.remove(); };
    sheet.insertBefore(newItem, addRow);
    saveState();
  };
  addRow.appendChild(inp);
  addRow.appendChild(saveB);
  sheet.appendChild(addRow);

  return sheet;
}

// Re-render on resize (desktop ↔ mobile switch)
window.addEventListener('resize', () => {
  const scene = state.scenes.find(s => s.id === state.currentSceneId);
  if (scene && document.getElementById('page-sim').classList.contains('active')) {
    renderTree();
  }
});

  if (document.getElementById('lock-input').value === '0202') {
    document.getElementById('lock-screen').style.display = 'none';
  } else {
    document.getElementById('lock-err').textContent = '密码不对';
    document.getElementById('lock-input').value = '';
  }
}
